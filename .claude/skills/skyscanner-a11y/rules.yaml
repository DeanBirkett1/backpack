# ─────────────────────────────────────────────────────────────────────────────
# Accessibility Sub-Agent — Rules Configuration
# Owner: Dean Birkett (Accessibility, Skyscanner)
# Last reviewed: 2026-03-31
#
# This file controls what the accessibility sub-agent checks, how it scores
# findings, and when it blocks a launch. Edit this file to change rules,
# thresholds, or routing. No engineering support required.
#
# Changes take effect on the next analysis run — no rebuild needed.
# ─────────────────────────────────────────────────────────────────────────────


# ── Sub-agent identity ────────────────────────────────────────────────────────

agent:
  name: accessibility
  version: "0.2.0"
  domain_owner: "Dean Birkett"
  route_to: "accessibility"           # Default Jira/Slack routing target
  description: >
    Checks WCAG 2.2 AA compliance. Covers colour contrast, keyboard
    navigability, screen reader compatibility, touch target sizing, focus
    management, and ARIA usage. Grounded in Backpack component standards.


# ── Verdict thresholds ────────────────────────────────────────────────────────
# Controls when the sub-agent moves from advisory → action_required.
# These defaults apply unless a product tier overrides them below.

thresholds:
  default:
    # Any finding at this impact level immediately triggers action_required
    block_on_impact: "Blocker"
    # action_required also triggers if this many High findings are present
    action_required_high_count: 3
    # Manual AT testing is required whenever these impact levels are present
    manual_testing_required_for: ["Blocker", "High"]


# ── Product tier overrides ────────────────────────────────────────────────────
# Higher-risk areas use stricter thresholds per the AI Validation Framework
# risk model. Product area owners define their tier; these rules apply on top.
#
# tier: critical | high | medium | low

tiers:
  critical:
    # Examples: flights booking panel, payment flows, consent surfaces
    block_on_impact: "High"           # Stricter — any High blocks launch
    action_required_high_count: 1
    requires_human_signoff: true
    signoff_contact: "Dean Birkett"

  high:
    # Examples: search results, hotel/car booking panel
    block_on_impact: "Blocker"
    action_required_high_count: 2
    requires_human_signoff: false

  medium:
    # Examples: content pages, notifications, non-core settings
    block_on_impact: "Blocker"
    action_required_high_count: 5
    requires_human_signoff: false

  low:
    # Examples: CMS edits, internal dashboards
    block_on_impact: "Blocker"
    action_required_high_count: 99   # Effectively never blocks on High alone
    requires_human_signoff: false


# ── Skyscanner-specific rules ─────────────────────────────────────────────────
# These are added to the Claude system prompt at runtime.
# Add new rules here — they apply immediately without a code change.

skyscanner_rules:

  # Component-specific rules
  - id: SKY-001
    description: >
      BpkSwitch is announced as "checkbox" by screen readers. This is expected
      behaviour — do not flag it as a defect.
    action: suppress
    applies_to: ["BpkSwitch", "switch"]

  - id: SKY-002
    description: >
      Strikethrough prices (text-decoration: line-through) are not announced
      by screen readers. Always flag if no visually hidden text provides
      the original price context.
    action: flag
    impact_override: "High"
    applies_to: ["BpkPrice", "price", "strikethrough"]

  - id: SKY-003
    description: >
      Date cells in BpkCalendar and BpkDatepicker must use aria-selected,
      not aria-pressed. Flag any date cell using aria-pressed.
    action: flag
    impact_override: "High"
    applies_to: ["BpkCalendar", "BpkDatepicker", "calendar", "datepicker"]

  - id: SKY-004
    description: >
      Card list components on web must use <ul> or <ol> to wrap the card
      collection. Do not apply this rule to iOS — iOS follows Apple HIG
      and intentionally does not group at container level.
    action: flag
    impact_override: "Medium"
    applies_to: ["BpkCardList", "card-list"]
    platform_exclude: ["iOS"]

  - id: SKY-005
    description: >
      Info banners use an icon to communicate type (information, warning,
      error, success). This meaning must be conveyed via visually hidden
      text — the icon must be aria-hidden. Flag if visually hidden text
      is absent.
    action: flag
    impact_override: "High"
    applies_to: ["BpkInfoBanner", "info-banner"]

  - id: SKY-006
    description: >
      Toggle buttons (e.g. show/hide, expand/collapse) must use either
      aria-expanded OR change their visible label — never both. Flag any
      toggle button that combines both methods.
    action: flag
    impact_override: "Medium"
    applies_to: ["toggle", "expand", "collapse"]

  - id: SKY-007
    description: >
      Link buttons (BpkButtonLink) must not navigate to a new page. They
      are for triggering actions only. Links (<a>) are for navigation.
      Flag any link button with an href pointing to a new page.
    action: flag
    impact_override: "Medium"
    applies_to: ["BpkButtonLink", "link-button"]

  # Booking flow rules
  - id: SKY-008
    description: >
      Passenger counter / nudger values must be announced on change via
      a live region or accessible name update. Flag if value changes
      are silent.
    action: flag
    impact_override: "High"
    applies_to: ["BpkNudger", "nudger", "passenger-counter"]

  - id: SKY-009
    description: >
      Fare comparison tables must use proper <th> with scope attributes.
      Do not rely on colour alone to distinguish fare tiers.
    action: flag
    impact_override: "High"
    applies_to: ["fare-table", "comparison-table"]


# ── Suppression list ──────────────────────────────────────────────────────────
# Axe rule IDs to suppress globally. Use sparingly and document the reason.
# Add a review date — suppressed rules should be reviewed periodically.

suppressions:
  - axe_rule_id: "color-contrast"
    reason: >
      Contrast is validated separately via the Backpack colour contrast
      script (scripts/check-colour-contrast.js). Suppressed here to avoid
      duplicate findings.
    review_date: "2026-09-01"
    owner: "Dean Birkett"


# ── Affected user group defaults ──────────────────────────────────────────────
# These map finding categories to Jira Affected User Groups.
# Used when Claude cannot determine groups from context.

user_group_defaults:
  contrast:         ["Low vision users"]
  keyboard:         ["Keyboard-only users", "Motor/Dexterity impairments"]
  screen_reader:    ["Screen reader users"]
  label_name:       ["Screen reader users", "Speech input users"]
  cognitive:        ["Cognitive/Learning disabilities"]
  motion:           ["Seizure/Vestibular sensitivities"]
  captions:         ["Deaf/Hard of hearing"]
  touch_target:     ["Motor/Dexterity impairments"]


# ── Manual testing requirements ───────────────────────────────────────────────
# Defines which finding types always require manual AT testing,
# regardless of automated confidence.

always_manual_test:
  - focus_management      # Focus traps, return focus, dynamic content
  - keyboard_flow         # Tab order through complex interactive flows
  - screen_reader_ux      # Announcement quality and sequence
  - dynamic_content       # Live region timing and content
  - mobile_gestures       # Swipe navigation, double-tap, gesture alternatives

manual_testing_note: >
  Automated tools cover approximately 30-40% of WCAG criteria. Findings
  involving interaction, focus management, or dynamic content require
  manual testing with NVDA+Chrome, VoiceOver+Safari, VoiceOver iOS,
  and TalkBack Android before sign-off.
